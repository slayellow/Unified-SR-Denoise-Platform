task: sr          # SRDataset을 scale=1로 사용 (degradation pipeline 재활용)
model:
  name: svfocussrnet
  use_advanced_rep: true # Hot Pixel(스파이크 노이즈) 방어를 위한 강력한 RepBlock_Advanced 사용
  scale: 1          # Denoise: 해상도 유지
  dim: 32            # Crouton Layout 최적 채널 (32 정렬)
  n_resblocks: 3     # QuickDenoiseNet Medium과 동등 연산량

data:
  type: eo
  train_root:
    - /mnt/data_server/etc/jshong/SuperResolution/Pretrained_Dataset/train/
  val_hr_root: /mnt/data_server/etc/jshong/SuperResolution/Pretrained_Dataset/val_denoise/HR
  val_lr_root: /mnt/data_server/etc/jshong/SuperResolution/Pretrained_Dataset/val_denoise/LR

train:
  epochs: 300
  batch_size: 128
  lr: 5e-5
  num_workers: 4
  radient_accumulation_steps: 1
  patch_size: 256
  save_interval: 20
  save_name: "train_svfocusdenoise_adv_x1_epoch300_lr5e-5_edge_ssim_perceptual_v2_260414"

  pretrained_path: null

  optimizer:
    type: AdamW
    betas: [0.9, 0.999]
  weight_decay: 1e-4
  grad_clip: 1.0

  early_stopping:
    patience: 50
    min_delta: 0.0001
    monitor: 'lpips'  # 관찰할 지표 이름 ('loss', 'psnr', 'ssim', 'lpips', 'niqe' 중 입력)
    mode: 'min'       # 값이 높을수록 좋은 지표인지 설정 (PSNR, SSIM은 'max' / Loss, LPIPS은 'min')

  scheduler:
    type: CosineAnnealingLR
    T_max: 300
    eta_min: 1e-7

loss:
  charbonnier:
    enabled: true
    weight: 1.0
  edge:
    enabled: true
    weight: 0.15
    mode: 'gray'
  ssim:
    enabled: true
    weight: 0.5
  l1:
    enabled: false
    weight: 1.0
  perceptual:
    enabled: true
    weight: 0.05
  tv:
    enabled: false
    weight: 0.1

export_onnx: false
