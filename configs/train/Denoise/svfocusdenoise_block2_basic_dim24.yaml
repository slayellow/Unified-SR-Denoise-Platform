task: sr          # SRDataset을 scale=1로 사용 (degradation pipeline 재활용)
model:
  name: svfocussrnet
  use_advanced_rep: false # basic RepBlock 사용
  scale: 1          # Denoise: 해상도 유지
  dim: 24           # channel 축소 비교용
  n_resblocks: 2    # block2/basic 경량화 버전

data:
  type: eo
  train_root:
    - /mnt/data_server/etc/jshong/SuperResolution/Pretrained_Dataset/train/
  val_hr_root: /mnt/data_server/etc/jshong/SuperResolution/Pretrained_Dataset/val_denoise/HR
  val_lr_root: /mnt/data_server/etc/jshong/SuperResolution/Pretrained_Dataset/val_denoise/LR

train:
  epochs: 300
  batch_size: 128
  lr: 5e-5
  num_workers: 4
  gradient_accumulation_steps: 1
  patch_size: 256
  save_interval: 20
  save_name: "train_svfocusdenoise_basic_x1_dim24_block2_epoch300_lr5e-5_awgn_260417"

  pretrained_path: null

  optimizer:
    type: AdamW
    betas: [0.9, 0.999]
  weight_decay: 1e-4
  grad_clip: 1.0

  early_stopping:
    patience: 50
    min_delta: 0.0001
    monitor: 'loss'
    mode: 'min'

  scheduler:
    type: CosineAnnealingLR
    T_max: 300
    eta_min: 1e-7

loss:
  charbonnier:
    enabled: true
    weight: 1.0
  edge:
    enabled: true
    weight: 0.08
    mode: 'gray'
  ssim:
    enabled: true
    weight: 0.15
  l1:
    enabled: false
    weight: 1.0
  perceptual:
    enabled: false
    weight: 0.0
  color_consistency:
    enabled: true
    weight: 0.08
    loss_type: 'l1'
  hot_pixel_masked:
    enabled: true
    weight: 0.15
    threshold: 0.15
    base_loss: 'charbonnier'
    kernel_size: 3
  tv:
    enabled: false
    weight: 0.1

export_onnx: false
