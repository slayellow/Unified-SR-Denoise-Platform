task: guide
model:
  name: svfocussrnet
  scale: 2
  dim: 32
  guided: false  # SISR 모델 → guide를 모델에 전달하지 않음

data:
  type: ir
  train_hr_root:
    - /mnt/data_server/etc/jshong/SuperResolution/GSR_Dataset/FLIR/HR_unified/train
    - /mnt/data_server/etc/jshong/SuperResolution/GSR_Dataset/LLVIP/HR/train
    - /mnt/data_server/etc/jshong/SuperResolution/GSR_Dataset/M3FD/HR/train
  train_lr_root:
    - /mnt/data_server/etc/jshong/SuperResolution/GSR_Dataset/FLIR/LRx2/train
    - /mnt/data_server/etc/jshong/SuperResolution/GSR_Dataset/LLVIP/LRx2/train
    - /mnt/data_server/etc/jshong/SuperResolution/GSR_Dataset/M3FD/LRx2/train
  train_guide_root:
    - /mnt/data_server/etc/jshong/SuperResolution/GSR_Dataset/FLIR/RGB_unified/train
    - /mnt/data_server/etc/jshong/SuperResolution/GSR_Dataset/LLVIP/RGB/train
    - /mnt/data_server/etc/jshong/SuperResolution/GSR_Dataset/M3FD/RGB/train

  val_hr_root:
    - /mnt/data_server/etc/jshong/SuperResolution/GSR_Dataset/LLVIP/HR/val
    - /mnt/data_server/etc/jshong/SuperResolution/GSR_Dataset/M3FD/HR/val
  val_lr_root:
    - /mnt/data_server/etc/jshong/SuperResolution/GSR_Dataset/LLVIP/LRx2/val
    - /mnt/data_server/etc/jshong/SuperResolution/GSR_Dataset/M3FD/LRx2/val
  val_guide_root:
    - /mnt/data_server/etc/jshong/SuperResolution/GSR_Dataset/LLVIP/RGB/val
    - /mnt/data_server/etc/jshong/SuperResolution/GSR_Dataset/M3FD/RGB/val

train:
  epochs: 300
  batch_size: 128
  lr: 1e-4
  num_workers: 4
  gradient_accumulation_steps: 1
  patch_size: 128
  save_interval: 20
  save_name: "train_gsr_svfocussrnet_x2_epoch300_sisr_baseline"
  pretrained_path: null

  optimizer:
    type: Adam
    betas: [0.9, 0.999]
  weight_decay: 0
  grad_clip: 1.0

  early_stopping:
    patience: 50
    min_delta: 0.0001

  scheduler:
    type: CosineAnnealingLR
    T_max: 300
    eta_min: 1e-7

loss:
  charbonnier:
    enabled: true
    weight: 1.0
  ssim:
    enabled: true
    weight: 0.1
  edge:
    enabled: true
    weight: 0.15
    mode: 'gray'
