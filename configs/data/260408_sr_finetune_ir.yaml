# 260408 SR Finetune Config (Infrared Target)
dataset_type: sr

# General Settings
crop_size: 256
use_flip: true
use_rot: true

# Degradation Pipeline Settings
degradation:
  # Stage 1: Pre-resize degradation (Simulate optics/atmosphere)
  stage1:
    blur:
      enabled: true
      prob: 0.3
      kernel_probs: [0.45, 0.25, 0.12, 0.03, 0.12, 0.03]
      kernel_sizes: [7, 9, 11, 13, 15, 17, 19, 21]
      sigma: [0.2, 1.5]
      betag: [0.5, 4.0]
      betap: [1.0, 2.0]
    
    resize:
      enabled: true
      prob: 0.7
      scale_min: 0.5
      scale_max: 1.0
      interpolations: ["cv2.INTER_LINEAR", "cv2.INTER_CUBIC", "cv2.INTER_AREA"]
    
    # [TWEAK] Reduced generic wild noise 
    gaussian_noise:
      enabled: true
      prob: 0.2
      sigma_min: 1
      sigma_max: 5
      gray_prob: 1.0
    
    poisson_noise:
      enabled: true
      prob: 0.3
      scale_min: 0.05
      scale_max: 3.0
      gray_prob: 1.0

    jpeg:
      enabled: true
      prob: 0.5
      quality_min: 85
      quality_max: 95

    # [TWEAK] Sinc filter for Jaggies suppression (important for IR targets)
    sinc:
      enabled: true
      prob: 0.3
      kernel_sizes: [7, 9, 11, 13, 15, 17, 19, 21]
      
  # Stage 2: Post-resize degradation (Simulate sensor/digital artifacts)
  stage2:
    blur:
      enabled: true
      prob: 0.5
      kernel_probs: [0.45, 0.25, 0.12, 0.03, 0.12, 0.03]
      kernel_sizes: [7, 9, 11, 13, 15, 17, 19, 21]
      sigma: [0.2, 1.5]
      betag: [0.5, 4.0]
      betap: [1.0, 2.0]
    
    target_resize:
      enabled: true
      interpolations: ["cv2.INTER_CUBIC", "cv2.INTER_LINEAR", "cv2.INTER_LANCZOS4"]

    # Sensor Specific Noise (IR)
    ir_noise:
      enabled: true
      non_uniformity:
        prob: 0.5 
        amp_min: 0.1
        amp_max: 0.3
      vertical_line: 
        prob: 0.5
        intensity_min: 2
        intensity_max: 10
      thermal_noise:
        sigma_min: 5
        sigma_max: 20
        gray_prob: 1.0

    common_noise:
      enabled: false 

    final_jpeg:
      enabled: true
      prob: 0.8
      quality_min: 50
      quality_max: 90
      
    # [NEW] Enforce Hot Pixels for IR microbolometers
    hot_pixels:
      enabled: true
      prob: 0.7  # Higher prob because dead/hot pixels are notorious in IR!
      density_min: 0.001
      density_max: 0.005 
      blob_prob: 0.5     
      blob_radius_min: 1
      blob_radius_max: 5 # Tighter blobs for IR characteristics
