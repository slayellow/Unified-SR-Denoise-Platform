# 260408 SR General Training Degradation Config (with targeted Sensor Noise)
dataset_type: sr

# General Settings
crop_size: 256
use_flip: true
use_rot: true

# Degradation Pipeline Settings
degradation:
  # Stage 1: Pre-resize degradation (Simulate optics/atmosphere)
  stage1:
    blur:
      enabled: true
      prob: 0.5
      kernel_probs: [0.45, 0.25, 0.12, 0.03, 0.12, 0.03]
      kernel_sizes: [7, 9, 11, 13, 15, 17, 19, 21]
      sigma: [0.2, 3.0]
      betag: [0.5, 4.0]
      betap: [1.0, 2.0]
    
    resize:
      enabled: true
      prob: 0.7
      scale_min: 0.5
      scale_max: 1.0
      interpolations: ["cv2.INTER_LINEAR", "cv2.INTER_CUBIC", "cv2.INTER_AREA"]
    
    # [TWEAK] Reduced generic wild noise to preserve model capacity for structure
    gaussian_noise:
      enabled: true
      prob: 0.3
      sigma_min: 1
      sigma_max: 5
      gray_prob: 0.5 
    
    poisson_noise:
      enabled: true
      prob: 0.3
      scale_min: 0.05
      scale_max: 3.0
      gray_prob: 0.5

    jpeg:
      enabled: true
      prob: 0.5
      quality_min: 85
      quality_max: 95

    # [TWEAK] Increased Sinc probability to handle Jaggies
    sinc:
      enabled: true
      prob: 0.25
      kernel_sizes: [7, 9, 11, 13, 15, 17, 19, 21]
      
  # Stage 2: Post-resize degradation (Simulate sensor/digital artifacts)
  stage2:
    blur:
      enabled: true
      prob: 0.5
      kernel_probs: [0.45, 0.25, 0.12, 0.03, 0.12, 0.03]
      kernel_sizes: [7, 9, 11, 13, 15, 17, 19, 21]
      sigma: [0.2, 1.5]
      betag: [0.5, 4.0]
      betap: [1.0, 2.0]
    
    target_resize:
      enabled: true
      interpolations: ["cv2.INTER_CUBIC", "cv2.INTER_LINEAR", "cv2.INTER_LANCZOS4"]

    # [TWEAK] Reduced common noise for base training
    common_noise:
      enabled: true
      prob: 0.2
      sigma_min: 1
      sigma_max: 10
      gray_prob: 0.2

    final_jpeg:
      enabled: true
      prob: 0.8
      quality_min: 50
      quality_max: 90

    # [NEW] Explicitly add sensor-specific noises to base train
    chroma_noise:
      enabled: true
      prob: 0.5
      sigma_min: 5
      sigma_max: 20
      downscale: 4

    hot_pixels:
      enabled: true
      prob: 0.5      
      density_min: 0.0005
      density_max: 0.003 
      blob_prob: 0.4     
      blob_radius_min: 1
      blob_radius_max: 8
