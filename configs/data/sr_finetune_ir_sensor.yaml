# SR Finetune Config: IR sensor LR input
dataset_type: sr
clean_prob: 0.05

crop_size: 256
use_flip: true
use_rot: true

# Use this when SR receives raw/noisy IR LR. Keep IR-specific artifacts active.
degradation:
  stage1:
    blur:
      enabled: true
      prob: 0.35
      kernel_probs: [0.45, 0.25, 0.12, 0.03, 0.12, 0.03]
      kernel_sizes: [7, 9, 11, 13, 15, 17, 19, 21]
      sigma: [0.2, 1.5]
      betag: [0.5, 4.0]
      betap: [1.0, 2.0]

    resize:
      enabled: true
      prob: 0.70
      scale_min: 0.5
      scale_max: 1.0
      interpolations: ["cv2.INTER_LINEAR", "cv2.INTER_CUBIC", "cv2.INTER_AREA"]

    gaussian_noise:
      enabled: true
      prob: 0.20
      sigma_min: 1
      sigma_max: 5
      gray_prob: 1.0

    poisson_noise:
      enabled: true
      prob: 0.30
      scale_min: 0.05
      scale_max: 3.0
      gray_prob: 1.0

    jpeg:
      enabled: true
      prob: 0.45
      quality_min: 85
      quality_max: 95

    sinc:
      enabled: true
      prob: 0.30
      kernel_sizes: [7, 9, 11, 13, 15, 17, 19, 21]

  stage2:
    blur:
      enabled: true
      prob: 0.50
      kernel_probs: [0.45, 0.25, 0.12, 0.03, 0.12, 0.03]
      kernel_sizes: [7, 9, 11, 13, 15, 17, 19, 21]
      sigma: [0.2, 1.5]
      betag: [0.5, 4.0]
      betap: [1.0, 2.0]

    target_resize:
      enabled: true
      interpolations: ["cv2.INTER_CUBIC", "cv2.INTER_LINEAR", "cv2.INTER_LANCZOS4"]

    ir_noise:
      enabled: true
      non_uniformity:
        prob: 0.50
        amp_min: 0.08
        amp_max: 0.25
      vertical_line:
        prob: 0.45
        intensity_min: 2
        intensity_max: 8
      thermal_noise:
        sigma_min: 4
        sigma_max: 16
        gray_prob: 1.0

    common_noise:
      enabled: false
      prob: 0.0

    final_jpeg:
      enabled: true
      prob: 0.60
      quality_min: 60
      quality_max: 92

    hot_pixels:
      enabled: true
      prob: 0.60
      density_min: 0.0005
      density_max: 0.0035
      blob_prob: 0.35
      blob_radius_min: 1
      blob_radius_max: 4
