dataset_type: denoise
clean_prob: 0.2

crop_size: 256
use_flip: true
use_rot: true

degradation:
  stage1:
    unprocess_noise:
      enabled: true
      prob: 0.7
      read_noise_max: 0.01
      shot_noise_max: 6.0

    gaussian_noise:
      enabled: true
      prob: 0.5
      sigma_min: 1
      sigma_max: 6

    poisson_noise:
      enabled: true
      prob: 0.4
      scale_min: 0.05
      scale_max: 2.0

    jpeg:
      enabled: true
      prob: 0.15
      quality_min: 88
      quality_max: 98

  stage2:
    common_noise:
      enabled: true
      prob: 0.3
      sigma_min: 1
      sigma_max: 8

    final_jpeg:
      enabled: true
      prob: 0.1
      quality_min: 90
      quality_max: 98

    blur:
      enabled: false

    target_resize:
      enabled: false

    chroma_noise:
      enabled: false

    hot_pixels:
      enabled: false

    ir_noise:
      enabled: false
