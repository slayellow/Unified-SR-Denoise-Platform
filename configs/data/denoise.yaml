dataset_type: sr
clean_prob: 0.2

crop_size: 256
use_flip: true
use_rot: true

degradation:
  stage1:
    unprocess_noise:
      enabled: true
      prob: 0.5
      read_noise_max: 0.02
      shot_noise_max: 10.0
    blur:
      enabled: true
      prob: 0.5
      kernel_probs: [0.45, 0.25, 0.12, 0.03, 0.12, 0.03]
      kernel_sizes: [7, 9, 11, 13, 15, 17, 19, 21]
      sigma: [0.2, 3.0]
      betag: [0.5, 4.0]
      betap: [1.0, 2.0]
    resize:
      enabled: true
      prob: 0.7
      scale_min: 0.5
      scale_max: 1.0
      interpolations: ["cv2.INTER_LINEAR", "cv2.INTER_CUBIC", "cv2.INTER_AREA"]
    gaussian_noise:
      enabled: true
      prob: 0.5
      sigma_min: 1
      sigma_max: 5
    poisson_noise:
      enabled: true
      prob: 0.5
      scale_min: 0.05
      scale_max: 3.0
    jpeg:
      enabled: true
      prob: 0.5
      quality_min: 85
      quality_max: 95
    sinc:
      enabled: true
      prob: 0.25
      kernel_sizes: [7, 9, 11, 13, 15, 17, 19, 21]

  stage2:
    blur:
      enabled: true
      prob: 0.5
      kernel_sizes: [7, 9, 11, 13, 15, 17, 19, 21]
      sigma: [0.2, 1.5]

    target_resize:
      enabled: true
      interpolations: ["cv2.INTER_LINEAR", "cv2.INTER_CUBIC"]

    common_noise:
      enabled: true
      prob: 0.5      
      sigma_min: 2
      sigma_max: 15

    ir_noise:
      enabled: false
      non_uniformity:
        amp_max: 0.3
        amp_min: 0.1
        prob: 0.5
      thermal_noise:
        gray_prob: 0.9
        sigma_max: 20
        sigma_min: 5
      vertical_line:
        intensity_max: 10
        intensity_min: 2
        prob: 0.5
    final_jpeg:
      enabled: true
      prob: 0.8
      quality_min: 30
      quality_max: 85

    chroma_noise:
      enabled: true
      prob: 0.5
      sigma_min: 1.0
      sigma_max: 20
      downscale: 4

    hot_pixels:
      enabled: true
      prob: 0.5      
      density_min: 0.0001
      density_max: 0.003 
      blob_prob: 0.4     
      blob_radius_min: 1
      blob_radius_max: 4