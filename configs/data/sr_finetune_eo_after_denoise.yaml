# SR Finetune Config: EO input after denoise
dataset_type: sr
clean_prob: 0.10

crop_size: 256
use_flip: true
use_rot: true

# EO SR runs after the denoise model. This profile therefore keeps optics,
# resampling, and mild compression artifacts, while avoiding raw sensor defects
# that should already be handled upstream.
degradation:
  stage1:
    blur:
      enabled: true
      prob: 0.35
      kernel_probs: [0.50, 0.22, 0.10, 0.03, 0.12, 0.03]
      kernel_sizes: [7, 9, 11, 13, 15]
      sigma: [0.2, 1.6]
      betag: [0.8, 3.0]
      betap: [1.0, 1.6]

    resize:
      enabled: true
      prob: 0.70
      scale_min: 0.5
      scale_max: 1.0
      interpolations: ["cv2.INTER_LINEAR", "cv2.INTER_CUBIC", "cv2.INTER_AREA"]

    gaussian_noise:
      enabled: true
      prob: 0.10
      sigma_min: 1
      sigma_max: 3
      gray_prob: 0.5

    poisson_noise:
      enabled: true
      prob: 0.10
      scale_min: 0.05
      scale_max: 1.0
      gray_prob: 0.5

    jpeg:
      enabled: true
      prob: 0.20
      quality_min: 90
      quality_max: 98

    sinc:
      enabled: true
      prob: 0.25
      kernel_sizes: [7, 9, 11, 13, 15, 17, 19, 21]

  stage2:
    blur:
      enabled: true
      prob: 0.25
      kernel_probs: [0.50, 0.22, 0.10, 0.03, 0.12, 0.03]
      kernel_sizes: [7, 9, 11, 13, 15]
      sigma: [0.2, 1.0]
      betag: [0.8, 3.0]
      betap: [1.0, 1.6]

    target_resize:
      enabled: true
      interpolations: ["cv2.INTER_CUBIC", "cv2.INTER_LINEAR", "cv2.INTER_LANCZOS4"]

    ir_noise:
      enabled: false

    common_noise:
      enabled: true
      prob: 0.05
      sigma_min: 1
      sigma_max: 3
      gray_prob: 0.3

    final_jpeg:
      enabled: true
      prob: 0.20
      quality_min: 85
      quality_max: 98

    chroma_noise:
      enabled: true
      prob: 0.10
      sigma_min: 2
      sigma_max: 6
      downscale: 4

    hot_pixels:
      enabled: false
      prob: 0.0
