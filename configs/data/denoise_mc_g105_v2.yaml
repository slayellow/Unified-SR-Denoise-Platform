dataset_type: denoise
clean_prob: 0.05

crop_size: 256
use_flip: true
use_rot: true

# MC-G105 2차 finetune profile (re-tuned)
# 목표:
# - tint 보정 능력 유지
# - dim32 표현력으로 noise까지 같이 살리는 현상 완화
# - dim24_v2의 과한 smoothing / TV 부작용 완화
# - hot pixel 제거 학습 신호는 강화하되, 전체 noise를 무작정 세게 키우지는 않음
conditional_profiles:
  enabled: true
  sampling:
    time:
      day: 0.5
      night: 0.5
    zoom:
      low: 0.35
      mid: 0.30
      high: 0.35

  time_profiles:
    day:
      degradation:
        stage2:
          signal_instability:
            enabled: true
            prob: 0.22
            gain: [0.95, 1.06]
            gamma: [0.97, 1.05]
            channel_gain: [0.98, 1.03]
          color_cast:
            enabled: true
            prob: 0.26
            rg_shift: [-4.5, -1.0]
            bg_shift: [-2.5, 0.6]
            global_gain: [0.99, 1.02]
          hot_pixels:
            enabled: true
            prob: 0.28
            density_min: 0.00008
            density_max: 0.00055
            blob_prob: 0.14
            blob_radius_min: 1
            blob_radius_max: 2
    night:
      degradation:
        stage2:
          detail_attenuation:
            enabled: true
            prob: 0.42
            blur_sigma: [0.40, 1.20]
            detail_blend: [0.18, 0.42]
            contrast: [0.86, 0.96]
          signal_instability:
            enabled: true
            prob: 0.12
            gain: [0.98, 1.04]
            gamma: [0.98, 1.06]
            channel_gain: [0.98, 1.03]
          color_cast:
            enabled: true
            prob: 0.48
            rg_shift: [-6.0, -1.5]
            bg_shift: [-7.0, -2.0]
            global_gain: [0.98, 1.02]
          chroma_noise:
            enabled: true
            prob: 0.36
            sigma_min: 3.0
            sigma_max: 10.0
            downscale: 4
          hot_pixels:
            enabled: true
            prob: 0.16
            density_min: 0.00003
            density_max: 0.00022
            blob_prob: 0.10
            blob_radius_min: 1
            blob_radius_max: 2
          common_noise:
            enabled: true
            prob: 0.38
            sigma_min: 2
            sigma_max: 7
            gray_prob: 0.28

  zoom_profiles:
    low:
      degradation:
        stage2:
          detail_attenuation:
            enabled: true
            prob: 0.12
            blur_sigma: [0.20, 0.60]
            detail_blend: [0.10, 0.24]
            contrast: [0.92, 0.99]
          hot_pixels:
            enabled: true
            prob: 0.24
            density_min: 0.00008
            density_max: 0.00060
            blob_prob: 0.14
            blob_radius_min: 1
            blob_radius_max: 2
    mid:
      degradation:
        stage2:
          detail_attenuation:
            enabled: true
            prob: 0.24
            blur_sigma: [0.25, 0.85]
            detail_blend: [0.12, 0.30]
            contrast: [0.90, 0.98]
          signal_instability:
            enabled: true
            prob: 0.16
            gain: [0.96, 1.05]
            gamma: [0.97, 1.05]
            channel_gain: [0.98, 1.03]
          hot_pixels:
            enabled: true
            prob: 0.20
            density_min: 0.00005
            density_max: 0.00035
            blob_prob: 0.12
            blob_radius_min: 1
            blob_radius_max: 2
    high:
      degradation:
        stage2:
          detail_attenuation:
            enabled: true
            prob: 0.42
            blur_sigma: [0.45, 1.20]
            detail_blend: [0.18, 0.40]
            contrast: [0.86, 0.95]
          signal_instability:
            enabled: true
            prob: 0.24
            gain: [0.95, 1.07]
            gamma: [0.96, 1.07]
            channel_gain: [0.97, 1.04]
          color_cast:
            enabled: true
            prob: 0.38
            rg_shift: [-6.5, -2.0]
            bg_shift: [-6.0, -0.8]
            global_gain: [0.98, 1.02]
          common_noise:
            enabled: true
            prob: 0.34
            sigma_min: 2
            sigma_max: 7
            gray_prob: 0.28

  combo_profiles:
    night__high:
      degradation:
        stage2:
          detail_attenuation:
            enabled: true
            prob: 0.56
            blur_sigma: [0.55, 1.35]
            detail_blend: [0.22, 0.48]
            contrast: [0.82, 0.93]
          color_cast:
            enabled: true
            prob: 0.62
            rg_shift: [-7.0, -2.5]
            bg_shift: [-8.0, -2.5]
            global_gain: [0.98, 1.02]
          chroma_noise:
            enabled: true
            prob: 0.44
            sigma_min: 4.0
            sigma_max: 12.0
            downscale: 4
          common_noise:
            enabled: true
            prob: 0.45
            sigma_min: 3
            sigma_max: 9
            gray_prob: 0.32
    day__high:
      degradation:
        stage2:
          signal_instability:
            enabled: true
            prob: 0.30
            gain: [0.94, 1.07]
            gamma: [0.96, 1.05]
            channel_gain: [0.97, 1.03]
          color_cast:
            enabled: true
            prob: 0.30
            rg_shift: [-6.0, -1.5]
            bg_shift: [-3.0, 0.5]
            global_gain: [0.99, 1.02]
          hot_pixels:
            enabled: true
            prob: 0.18
            density_min: 0.00004
            density_max: 0.00025
            blob_prob: 0.10
            blob_radius_min: 1
            blob_radius_max: 2

degradation:
  stage1:
    unprocess_noise:
      enabled: true
      prob: 0.60
      read_noise_max: 0.012
      shot_noise_max: 8.0

    turbulence:
      enabled: false
      prob: 0.0

    blur:
      enabled: true
      prob: 0.08
      kernel_probs: [0.58, 0.18, 0.10, 0.02, 0.09, 0.03]
      kernel_sizes: [7, 9, 11, 13, 15]
      sigma: [0.2, 0.8]
      betag: [0.8, 2.0]
      betap: [1.0, 1.4]

    resize:
      enabled: false
      prob: 0.0
      scale_min: 1.0
      scale_max: 1.0
      interpolations: ["cv2.INTER_LINEAR"]

    gaussian_noise:
      enabled: true
      prob: 0.24
      sigma_min: 1
      sigma_max: 3
      gray_prob: 0.25

    poisson_noise:
      enabled: true
      prob: 0.22
      scale_min: 0.05
      scale_max: 1.0
      gray_prob: 0.20

    jpeg:
      enabled: true
      prob: 0.04
      quality_min: 94
      quality_max: 99

    sinc:
      enabled: false
      prob: 0.0
      kernel_sizes: [7, 9, 11, 13, 15]

  stage2:
    blur:
      enabled: true
      prob: 0.10
      kernel_probs: [0.62, 0.18, 0.08, 0.02, 0.08, 0.02]
      kernel_sizes: [7, 9, 11, 13]
      sigma: [0.2, 0.6]
      betag: [0.8, 2.0]
      betap: [1.0, 1.4]

    target_resize:
      enabled: false
      interpolations: ["cv2.INTER_CUBIC", "cv2.INTER_LINEAR"]

    detail_attenuation:
      enabled: true
      prob: 0.18
      blur_sigma: [0.20, 0.70]
      detail_blend: [0.10, 0.24]
      contrast: [0.90, 0.99]

    signal_instability:
      enabled: true
      prob: 0.08
      gain: [0.97, 1.03]
      gamma: [0.98, 1.03]
      channel_gain: [0.98, 1.02]

    color_cast:
      enabled: true
      prob: 0.20
      rg_shift: [-5.0, -1.0]
      bg_shift: [-4.0, 0.5]
      global_gain: [0.99, 1.02]

    common_noise:
      enabled: true
      prob: 0.20
      sigma_min: 1
      sigma_max: 4
      gray_prob: 0.2

    ir_noise:
      enabled: false

    chroma_noise:
      enabled: true
      prob: 0.16
      sigma_min: 2.0
      sigma_max: 6.0
      downscale: 4

    hot_pixels:
      enabled: true
      prob: 0.12
      density_min: 0.00003
      density_max: 0.00025
      blob_prob: 0.10
      blob_radius_min: 1
      blob_radius_max: 2

    final_jpeg:
      enabled: true
      prob: 0.03
      quality_min: 95
      quality_max: 99
