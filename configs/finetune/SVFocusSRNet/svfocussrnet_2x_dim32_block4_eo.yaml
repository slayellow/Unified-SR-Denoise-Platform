task: sr
model:
  name: svfocussrnet
  scale: 2
  dim: 32
  n_resblocks: 4
  use_advanced_rep: false

data:
  type: eo
  train_root: /mnt/data_server/etc/jshong/SuperResolution/Pretrained_Dataset/train/
  val_hr_root: /mnt/data_server/etc/jshong/SuperResolution/Pretrained_Dataset/val/HR
  val_lr_root: /mnt/data_server/etc/jshong/SuperResolution/Pretrained_Dataset/val/LRx2

train:
  epochs: 100
  batch_size: 16
  lr: 5e-5
  num_workers: 4
  gradient_accumulation_steps: 2
  patch_size: 256
  save_interval: 20
  save_name: "finetune_svfocussrnet_eo_sr_x2_dim32_block4_epoch100_bs16_ga2_lr5e-5_charbonnier_perceptual_edge_ssim_tv_260505"

  pretrained_path: "checkpoints/train_svfocussrnet_sr_x2_dim32_block4_epoch300_bs64_lr1e-4_charbonnier_260428/best.pth"

  optimizer:
    type: AdamW
    betas: [0.9, 0.999]

  weight_decay: 0.0
  grad_clip: 1.0

  early_stopping:
    patience: 10
    min_delta: 0.0001

  scheduler:
    type: CosineAnnealingLR
    T_max: 100
    eta_min: 1e-7

loss:
  l1:
    enabled: false
    weight: 1.0
  charbonnier:
    enabled: true
    weight: 1.0
  perceptual:
    enabled: true
    weight: 0.01
  edge:
    enabled: true
    weight: 0.05
    mode: 'gray'
  ssim:
    enabled: true
    weight: 0.1
  tv:
    enabled: true
    weight: 0.005

export_onnx: false
