task: sr
model:
  name: svfocussrnet
  scale: 4
  dim: 32
  n_resblocks: 4
  use_advanced_rep: false

data:
  type: ir
  train_root: /mnt/data_server/etc/jshong/SuperResolution/Finetunning_Dataset/train/
  val_hr_root: /mnt/data_server/etc/jshong/SuperResolution/Finetunning_Dataset/val/HR
  val_lr_root: /mnt/data_server/etc/jshong/SuperResolution/Finetunning_Dataset/val/LRx4

train:
  epochs: 100
  batch_size: 32
  lr: 5e-5
  num_workers: 4
  gradient_accumulation_steps: 2
  patch_size: 256
  save_interval: 20
  save_name: "finetune_svfocussrnet_ir_sr_x4_dim32_block4_epoch100_bs32_ga2_lr5e-5_charbonnier_edge_ssim_tv_260505"

  pretrained_path: "checkpoints/train_svfocussrnet_sr_x4_dim32_block4_epoch300_bs64_lr1e-4_charbonnier_260428/best.pth"

  optimizer:
    type: AdamW
    betas: [0.9, 0.999]

  weight_decay: 0.0
  grad_clip: 1.0

  early_stopping:
    patience: 10
    min_delta: 0.0001

  scheduler:
    type: CosineAnnealingLR
    T_max: 100
    eta_min: 1e-7

loss:
  l1:
    enabled: false
    weight: 1.0
  charbonnier:
    enabled: true
    weight: 1.0
  perceptual:
    enabled: false
    weight: 0.01
  edge:
    enabled: true
    weight: 0.15
    mode: 'gray'
  ssim:
    enabled: true
    weight: 0.1
  tv:
    enabled: true
    weight: 0.01

export_onnx: false
