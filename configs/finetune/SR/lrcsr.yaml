task: sr
model:
  name: lrcsr
  scale: 2
  dim: 24 # Generally lighter

data:
  type: eo
  train_root: /mnt/data_server/etc/jshong/SuperResolution/8550/HR
  val_hr_root: /mnt/data_server/etc/jshong/SuperResolution/8550/HR_val
  val_lr_root: /mnt/data_server/etc/jshong/SuperResolution/8550/LR_val

train:
  epochs: 200 # Lighter models might need more epochs
  batch_size: 32
  lr: 2e-4
  num_workers: 4
  patch_size: 128
  save_interval: 20
  step_size: 100 # Unused if using ReduceLROnPlateau
  gamma: 0.5
  weight_decay: 1e-4
  grad_clip: 1.0
  scheduler:
    type: ReduceLROnPlateau
    patience: 30
    factor: 0.5

loss:
  l1:
    enabled: true
    weight: 1.0
  edge:
    enabled: false
    weight: 0.0

export_onnx: true
